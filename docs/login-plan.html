<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Page Plan</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-stone-50 flex items-center justify-center px-4">

  <div class="w-full max-w-sm">

    <!-- 돼지 이미지: 카드 위, 가로 꽉 차게 -->
    <div class="w-full overflow-hidden rounded-t-2xl">
      <img
        src="admin-login.png"
        alt="Lucky Piggy"
        class="w-full h-auto"
      />
    </div>

    <!-- 카드: 이미지 아래 붙음 -->
    <div class="w-full bg-white rounded-b-2xl shadow-sm border border-stone-100 border-t-0 px-8 py-10">

      <h1 class="text-center text-lg font-semibold text-gray-900 tracking-tight mb-8">
        Lucky Piggy Admin
      </h1>

      <div class="space-y-4">
        <div class="space-y-1.5">
          <label class="block text-sm font-medium text-gray-700">이메일</label>
          <input
            type="email"
            placeholder="admin@example.com"
            class="w-full rounded-lg border border-gray-200 bg-gray-50 px-3 py-2.5 text-sm text-gray-900 placeholder:text-gray-400 outline-none focus:border-gray-400 focus:bg-white focus:ring-2 focus:ring-gray-100 transition-all"
          />
        </div>

        <div class="space-y-1.5">
          <label class="block text-sm font-medium text-gray-700">비밀번호</label>
          <input
            type="password"
            placeholder="••••••••"
            class="w-full rounded-lg border border-gray-200 bg-gray-50 px-3 py-2.5 text-sm text-gray-900 placeholder:text-gray-400 outline-none focus:border-gray-400 focus:bg-white focus:ring-2 focus:ring-gray-100 transition-all"
          />
        </div>

        <button
          class="mt-2 w-full rounded-lg bg-gray-900 px-4 py-2.5 text-sm font-medium text-white hover:bg-gray-700 transition-colors cursor-pointer"
        >
          로그인
        </button>
      </div>

    </div>
  </div>


</body>
</html>
